<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 올림픽: 30초 복싱</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Jua', sans-serif; margin: 0; overflow: hidden; background-color: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
    .header-area { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; transition: opacity 0.3s; }
    h1 { margin: 0; font-size: 2.5em; color: #ffeb3b; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    .top-home-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-size: 1.2em; z-index: 15; transition: opacity 0.3s, background 0.3s; }
    .top-home-btn:hover { background: rgba(255,255,255,0.4); }
    .canvas-container { position: relative; width: 100%; max-width: 1280px; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: cover; display: block; } 
    video { display: none; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    .overlay h2 { font-size: 3.5em; margin-bottom: 30px; text-align: center; line-height: 1.3; color: white; }
    button { font-family: 'Jua', sans-serif; font-size: 1.8em; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #start-btn { background: #ffeb3b; color: #333; }
    button:hover { transform: scale(1.05); }
    #stop-btn { position: absolute; bottom: 20px; right: 20px; background: #DF0024; color: white; font-size: 1.2em; padding: 10px 20px; display: none; z-index: 10; }
    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: white; color: #333; padding: 40px; border-radius: 30px; text-align: center; width: 80%; max-width: 500px; }
    .modal-content h2 { color: #DF0024; font-size: 3em; margin-top: 0; }
    .record-text { font-size: 2.5em; margin: 20px 0; color: #0085C7; }
    input[type="text"] { font-family: 'Jua', sans-serif; font-size: 1.5em; padding: 10px; width: 90%; text-align: center; border: 2px solid #ccc; border-radius: 15px; margin-bottom: 20px; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn-group button { font-size: 1.1em; padding: 12px; border-radius: 15px; }
    .save-vid { background: #009F3D; color: white; }
    .save-img { background: #0085C7; color: white; }
    .replay-btn { background: #ff9800; color: white; width: 100%; margin-bottom: 10px; }
    .exit-btn { background: #757575; color: white; width: 100%; font-size: 1.5em; text-decoration: none; display: block; padding: 15px 0; border-radius: 50px; }
  </style>
</head>
<body>

  <audio id="bgm" src="media/boxing_bgm.mp3" loop></audio>
  <audio id="sfx-count" src="media/countdown.mp3"></audio>
  <audio id="sfx-start" src="media/start.mp3"></audio>
  <audio id="sfx-punch" src="media/punch.mp3"></audio>
  <audio id="sfx-cheer" src="media/cheer.mp3"></audio>

  <div id="ui-header" class="header-area">
    <h1>🥊 스마트 올림픽: 30초 복싱</h1>
  </div>
  <a id="ui-home" href="index.html" class="top-home-btn">🏠 메인으로</a>

  <div class="canvas-container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="overlay" class="overlay">
      <h2>화면에 나타나는 타켓을<br>빠르게 주먹으로 쳐주세요!</h2>
      <button id="start-btn">도전 시작!</button>
    </div>
    
    <button id="stop-btn">중단하기</button>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>경기 종료!</h2>
        <div id="final-record" class="record-text">최종 점수: 0점</div>
        <input type="text" id="player-name" placeholder="선수 이름을 적어주세요">
        <div class="btn-group">
          <button id="save-vid-btn" class="save-vid">🎥 영상 저장</button>
          <button id="save-img-btn" class="save-img">📸 사진 저장</button>
        </div>
        <button id="replay-btn" class="replay-btn">🔄 다시 도전하기</button>
        <a href="index.html" class="exit-btn">🏠 메인 화면으로</a>
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    canvasElement.width = 1280; canvasElement.height = 720;
    const canvasCtx = canvasElement.getContext('2d');
    
    const uiHeader = document.getElementById('ui-header');
    const uiHome = document.getElementById('ui-home');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const replayBtn = document.getElementById('replay-btn');
    const overlay = document.getElementById('overlay');
    const resultModal = document.getElementById('result-modal');

    const recordCanvas = document.createElement('canvas');
    recordCanvas.width = 1280; recordCanvas.height = 720;
    const recordCtx = recordCanvas.getContext('2d');

    function playSound(id) { 
      const s = document.getElementById(id); 
      if(s){ 
        s.currentTime = 0; 
        s.play().catch(e => console.warn(id + " 재생 실패: ", e)); 
      } 
    }

    const COUNTDOWN_SPEED = 500; 
    let gameState = 'waiting'; let score = 0; let timeLeft = 30.00; let startTime = 0;
    let countdownTick = 3; let countdownDisplay = ""; let countdownInterval = null;
    let targets = [];
    let mediaRecorder; let recordedChunks = [];
    let audioCtx; let audioDest; let globalMicStream = null;

    async function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        try {
          globalMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const micSource = audioCtx.createMediaStreamSource(globalMicStream);
          const micGain = audioCtx.createGain(); micGain.gain.value = 3.0;
          micSource.connect(micGain); micGain.connect(audioDest);
        } catch (e) {}
        const gameGain = audioCtx.createGain(); gameGain.gain.value = 0.4;
        gameGain.connect(audioDest); gameGain.connect(audioCtx.destination);
        document.querySelectorAll('audio').forEach(el => {
          if (!el.dataset.routed) {
            const source = audioCtx.createMediaElementSource(el);
            source.connect(gameGain); el.dataset.routed = "true";
          }
        });
      }
      await audioCtx.resume();
    }

    replayBtn.addEventListener('click', () => {
      resultModal.style.display = 'none';
      overlay.style.display = 'flex';
      startBtn.disabled = false;
      startBtn.innerText = "도전 시작!";
      gameState = 'waiting';
    });

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      await initAudio();
      startGameCycle();
    });

    function startGameCycle() {
  overlay.style.display = 'none'; 
  uiHeader.style.opacity = '0';
  uiHome.style.opacity = '0';
  stopBtn.style.display = 'block';

  score = 0; timeLeft = 30.00; targets = [];
  gameState = 'countdown'; countdownTick = 3; countdownDisplay = "3";
  
  // ❌ (기존 위치) 여기서 bgm.play() 하던 코드를 삭제하거나 주석 처리하세요.
  // const bgm = document.getElementById('bgm'); 
  // if(bgm) { bgm.currentTime = 0; bgm.play(); }

  playSound('sfx-count'); 

  countdownInterval = setInterval(() => {
    countdownTick--;
    if (countdownTick > 0) {
      countdownDisplay = countdownTick.toString();
    } else if (countdownTick === 0) {
      countdownDisplay = "START!";
      playSound('sfx-start');
    } else {
      clearInterval(countdownInterval);
      gameState = 'playing';
      startTime = Date.now();

      // ⭕ [수정] 여기가 정답입니다! 게임이 진짜 시작될 때 BGM 재생
      const bgm = document.getElementById('bgm');
      if(bgm) { 
        bgm.currentTime = 0; 
        bgm.play(); 
      }

      startRecording();
    }
  }, COUNTDOWN_SPEED);
}

    function onResults(results) {
      if (!results.image) return;
      const cw = 1280; const ch = 720;
      canvasCtx.drawImage(results.image, 0, 0, cw, ch);
      recordCtx.drawImage(results.image, 0, 0, cw, ch);

      if (results.poseLandmarks) {
        canvasCtx.save();
        canvasCtx.globalAlpha = 0.4;
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 4});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#DF0024', lineWidth: 2, radius: 4});
        canvasCtx.restore();

        if (gameState === 'playing') {
          const lm = results.poseLandmarks;
          const leftHand = {x: lm[19].x * cw, y: lm[19].y * ch};
          const rightHand = {x: lm[20].x * cw, y: lm[20].y * ch};
          targets = targets.filter(t => {
            const tx = t.x * cw; const ty = t.y * ch;
            if (Math.hypot(leftHand.x - tx, leftHand.y - ty) < t.radius + 30 || Math.hypot(rightHand.x - tx, rightHand.y - ty) < t.radius + 30) {
              score += 10; playSound('sfx-punch'); return false;
            }
            return (Date.now() - t.createdAt < 2000);
          });
        }
      }

      if (gameState === 'playing') {
        targets.forEach(t => {
          canvasCtx.beginPath(); canvasCtx.arc(t.x*cw, t.y*ch, t.radius, 0, 2*Math.PI);
          canvasCtx.fillStyle = '#DF0024'; canvasCtx.fill();
          canvasCtx.lineWidth = 5; canvasCtx.strokeStyle = 'white'; canvasCtx.stroke();
        });
      }

      drawUI(canvasCtx, cw, ch);
      drawUI(recordCtx, cw, ch);

      if (gameState === 'playing') {
        timeLeft = Math.max(0, 30 - (Date.now() - startTime) / 1000).toFixed(2);
        if (timeLeft <= 0) {
          gameState = 'finished'; stopRecording();
          stopBtn.style.display = 'none';
          document.getElementById('bgm').pause();
          playSound('sfx-cheer');
          document.getElementById('final-record').innerText = `최종 점수: ${score}점`;
          resultModal.style.display = 'flex';
          uiHeader.style.opacity = '1';
          uiHome.style.opacity = '1';
        }
      }
    }

    function drawUI(ctx, cw, ch) {
      ctx.font = "bold 120px 'Jua', sans-serif"; // 🌟 카운트다운 더 크게 강조
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.8)";

      if (gameState === 'countdown') {
        ctx.fillStyle = "#ffeb3b";
        ctx.fillText(countdownDisplay, cw/2, ch/2);
      } else if (gameState === 'playing') {
        ctx.font = "bold 80px 'Jua', sans-serif";
        ctx.textAlign = "left"; ctx.fillStyle = "#DF0024";
        ctx.fillText(`🥊 ${score}`, 40, 60);
        ctx.textAlign = "right"; ctx.fillStyle = "#ffeb3b";
        ctx.fillText(`⏳ ${timeLeft}`, cw - 40, 60);
      }
    }

    setInterval(() => {
      if (gameState === 'playing' && targets.length < 3) {
        targets.push({ x: 0.2 + Math.random() * 0.6, y: 0.2 + Math.random() * 0.5, radius: 45, createdAt: Date.now() });
      }
    }, 500);

    function startRecording() {
      recordedChunks = [];
      const stream = new MediaStream([...recordCanvas.captureStream(30).getTracks(), ...audioDest.stream.getTracks()]);
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.start();
    }
    function stopRecording() { if(mediaRecorder.state === "recording") mediaRecorder.stop(); }

    document.getElementById('save-vid-btn').onclick = () => {
      const blob = new Blob(recordedChunks, { type: 'video/webm' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `복싱기록_${document.getElementById('player-name').value || '선수'}.webm`; a.click();
    };

    document.getElementById('save-img-btn').onclick = () => {
      const a = document.createElement('a'); a.href = recordCanvas.toDataURL();
      a.download = `복싱기록_${document.getElementById('player-name').value || '선수'}.png`; a.click();
    };

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ selfieMode: true, modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 }).start();
    
    stopBtn.onclick = () => location.reload();
  </script>
</body>
</html>
