<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>스마트 올림픽: 50m 자유형 수영</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: 'Jua', sans-serif; text-align: center; background-color: #e0f7fa; margin: 0; padding: 20px 10px; display: flex; flex-direction: column; align-items: center;}
    h1 { color: #00838f; margin: 0 0 10px 0; font-size: 2.5em; letter-spacing: 1px;}
    .header-area { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .back-btn { padding: 10px 20px; background-color: #00838f; color: white; text-decoration: none; border-radius: 8px; font-size: 1.2em; transition: 0.2s; white-space: nowrap;}
    .back-btn:hover { background-color: #006064; }
    #container { position: relative; width: 100%; max-width: 1000px; aspect-ratio: 16 / 9; margin: 0 auto; }
    canvas { width: 100%; height: 100%; background-color: #b2ebf2; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border: 5px solid #00acc1; object-fit: cover; box-sizing: border-box; }
    #overlay, #result-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255,255,255,0.95); border-radius: 12px; z-index: 10; border: 5px solid #00acc1; box-sizing: border-box; }
    #result-modal { display: none; }
    button { padding: 15px 30px; font-family: 'Jua', sans-serif; font-size: 1.8em; color: white; background-color: #ff9800; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    button:hover { background-color: #e65100; transform: scale(1.05); }
    button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
    #stop-btn { position: absolute; bottom: 20px; right: 20px; display: none; padding: 10px 20px; font-size: 1.5em; background-color: #d32f2f; color: white; z-index: 11; }
    #stop-btn:hover { background-color: #b71c1c; }
    input[type="text"] { padding: 15px; font-family: 'Jua', sans-serif; font-size: 1.5em; border-radius: 5px; border: 2px solid #ccc; margin-bottom: 20px; text-align: center; width: 60%; max-width: 300px;}
    .action-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .small-btn { font-size: 1.3em; padding: 10px 20px; background-color: #00acc1; color: white;}
    .small-btn:hover { background-color: #00838f; }
  </style>
</head>
<body>
  <audio id="bgm" src="media/swim_bgm.mp3" loop crossorigin="anonymous"></audio>
  <audio id="sfx-count" src="media/countdown.mp3" crossorigin="anonymous"></audio>
  <audio id="sfx-start" src="media/start.mp3" crossorigin="anonymous"></audio>
  <audio id="sfx-cheer" src="media/cheer.mp3" crossorigin="anonymous"></audio>

  <div class="header-area">
    <a href="index.html" class="back-btn">⬅️ 메인으로</a>
    <h1>🏊 스마트 올림픽: 50m 수영</h1>
    <div style="width: 110px;"></div>
  </div>
  
  <div id="container">
    <video id="input_video" style="display:none;"></video>
    <canvas id="output_canvas" width="1280" height="720"></canvas>
    <div id="overlay">
      <h2 style="color: #00838f; margin-bottom: 20px; font-size: 3vw;">카메라 앞 2~3m 거리에서 양팔을 크게 휘저어주세요!</h2>
      <button id="start-btn" disabled>카메라 연결 중...</button>
    </div>
    <div id="result-modal">
      <h1 style="color: #00838f; font-size: 5vw; margin: 0;">터치패드 완료! 🎉</h1>
      <h2 id="final-record" style="font-size: 4vw; color: #ff9800; margin: 10px 0;">기록: 0.00초</h2>
      <input type="text" id="player-name" placeholder="학생 이름을 입력하세요">
      <div class="action-btns">
        <button id="save-img-btn" class="small-btn">📸 기록증 저장</button>
        <button id="save-vid-btn" class="small-btn">🎥 영상 저장</button>
        <button onclick="resetGame()" class="small-btn" style="background-color: #ff9800;">🔄 다시 하기</button>
      </div>
    </div>
    <button id="stop-btn">🚫 도전 중단</button>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const overlay = document.getElementById('overlay');
    const resultModal = document.getElementById('result-modal');
    
    function playSound(id) { const s = document.getElementById(id); if(s){ s.currentTime = 0; s.play().catch(e=>console.log(e)); } }

    let gameState = 'waiting'; let distance = 0; let leftArmState = 0; let rightArmState = 0; 
    let startTime = 0; let currentTimeStr = "0.00"; 
    let countdownTick = 3; let countdownDisplay = "3"; let countdownInterval = null;
    let mediaRecorder; let recordedChunks = [];

    // 🌟 오디오 라우팅
    let audioCtx; let audioDest;
    function initAudioRecording() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        document.querySelectorAll('audio').forEach(audioEl => {
          if (!audioEl.dataset.connected) {
            const source = audioCtx.createMediaElementSource(audioEl);
            source.connect(audioDest); source.connect(audioCtx.destination); 
            audioEl.dataset.connected = "true";
          }
        });
      }
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    startBtn.addEventListener('click', () => {
      startRecording(); gameState = 'countdown'; countdownTick = 3; countdownDisplay = "3";
      overlay.style.display = 'none'; stopBtn.style.display = 'block';
      
      const bgm = document.getElementById('bgm'); bgm.volume = 0.2; bgm.play();
      playSound('sfx-count');

      countdownInterval = setInterval(() => {
        countdownTick--;
        if (countdownTick > 0) { countdownDisplay = countdownTick.toString(); } 
        else if (countdownTick === 0) { countdownDisplay = "Start!"; playSound('sfx-start'); } 
        else { clearInterval(countdownInterval); gameState = 'playing'; startTime = Date.now(); bgm.volume = 0.6; }
      }, 500); // 🌟 500ms 간격
    });

    stopBtn.addEventListener('click', () => { resetGame(); });

    function resetGame() {
      if (gameState === 'countdown') clearInterval(countdownInterval);
      if (gameState === 'playing' || gameState === 'countdown') stopRecording();
      document.getElementById('bgm').pause(); document.getElementById('bgm').currentTime = 0;
      gameState = 'waiting'; distance = 0; leftArmState = 0; rightArmState = 0; currentTimeStr = "0.00";
      overlay.style.display = 'flex'; resultModal.style.display = 'none'; stopBtn.style.display = 'none';
    }

    function onResults(results) {
      canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height); canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 6});
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00e5ff', lineWidth: 4, radius: 6});

        if (gameState === 'playing') {
          const leftShoulderY = results.poseLandmarks[11].y; const leftWristY = results.poseLandmarks[15].y;
          const rightShoulderY = results.poseLandmarks[12].y; const rightWristY = results.poseLandmarks[16].y;
          const pullThreshold = 0.1; 

          if (leftWristY < leftShoulderY) { leftArmState = 1; } else if (leftWristY > leftShoulderY + pullThreshold && leftArmState === 1) { swimForward(); leftArmState = 0; }
          if (rightWristY < rightShoulderY) { rightArmState = 1; } else if (rightWristY > rightShoulderY + pullThreshold && rightArmState === 1) { swimForward(); rightArmState = 0; }
        }
      }
      canvasCtx.restore(); drawUI(); 
    }

    function drawUI() {
      const cw = canvasElement.width; const ch = canvasElement.height;
      function setTextStyle(font, color, align, base) { canvasCtx.font = `${font} 'Jua', sans-serif`; canvasCtx.fillStyle = color; canvasCtx.textAlign = align; canvasCtx.textBaseline = base; canvasCtx.strokeStyle = "rgba(0,0,0,0.6)"; canvasCtx.lineWidth = 8; }
      if (gameState === 'countdown') { setTextStyle("200px", "#f57f17", "center", "middle"); canvasCtx.strokeText(countdownDisplay, cw / 2, ch / 2); canvasCtx.fillText(countdownDisplay, cw / 2, ch / 2); } 
      else if (gameState === 'playing' || gameState === 'finished') {
        if (gameState === 'playing') { currentTimeStr = ((Date.now() - startTime) / 1000).toFixed(2); }
        setTextStyle("70px", "#ffeb3b", "right", "top"); canvasCtx.strokeText(`⏳ ${currentTimeStr}초`, cw - 30, 30); canvasCtx.fillText(`⏳ ${currentTimeStr}초`, cw - 30, 30);
        setTextStyle("80px", "#00e5ff", "left", "top"); canvasCtx.strokeText(`🏊 ${distance}m / 50m`, 30, 30); canvasCtx.fillText(`🏊 ${distance}m / 50m`, 30, 30);
      }
    }

    function swimForward() {
      if (distance < 50) {
        distance += 1; 
        if (distance >= 50) {
          gameState = 'finished'; stopRecording(); stopBtn.style.display = 'none';
          document.getElementById('bgm').pause(); playSound('sfx-cheer'); 
          document.getElementById('final-record').innerText = `기록: ${currentTimeStr}초`; resultModal.style.display = 'flex';
        }
      }
    }

    // 🌟 오디오 병합 녹화
    function startRecording() { 
      recordedChunks = []; initAudioRecording(); 
      const canvasStream = canvasElement.captureStream(30); 
      const combinedStream = new MediaStream([ ...canvasStream.getVideoTracks(), ...audioDest.stream.getAudioTracks() ]);
      let options = { mimeType: 'video/webm' }; if (MediaRecorder.isTypeSupported('video/mp4')) { options = { mimeType: 'video/mp4' }; } 
      mediaRecorder = new MediaRecorder(combinedStream, options); mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); }; mediaRecorder.start(); 
    }
    
    function stopRecording() { if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); }
    document.getElementById('save-vid-btn').addEventListener('click', () => { const actualMimeType = mediaRecorder.mimeType || 'video/webm'; const ext = actualMimeType.includes('mp4') ? 'mp4' : 'webm'; const blob = new Blob(recordedChunks, { type: actualMimeType }); const url = URL.createObjectURL(blob); const name = document.getElementById('player-name').value || "선수"; const a = document.createElement('a'); a.href = url; a.download = `스마트올림픽_${name}_${currentTimeStr}초.${ext}`; a.click(); });
    document.getElementById('save-img-btn').addEventListener('click', () => { const name = document.getElementById('player-name').value || "선수"; const cw = canvasElement.width; const ch = canvasElement.height; canvasCtx.font = "80px 'Jua', sans-serif"; canvasCtx.textAlign = "center"; canvasCtx.fillStyle = "white"; canvasCtx.strokeStyle = "black"; canvasCtx.lineWidth = 6; canvasCtx.strokeText(`🏆 ${name}의 기록: ${currentTimeStr}초`, cw / 2, ch - 50); canvasCtx.fillText(`🏆 ${name}의 기록: ${currentTimeStr}초`, cw / 2, ch - 50); const imgData = canvasElement.toDataURL("image/png"); const a = document.createElement('a'); a.href = imgData; a.download = `스마트올림픽_${name}_기록증.png`; a.click(); });
    
    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`}); pose.setOptions({ selfieMode: true, modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 }); pose.onResults(onResults);
    const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 }); 
    camera.start().then(() => { startBtn.disabled = false; startBtn.innerText = "수영 시작!"; }).catch(e => { startBtn.innerText = "카메라 오류"; });
  </script>
</body>
</html>
