<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
    // 강제 점검 모드: 모든 접속을 index.html로 돌려보냄
    window.location.href = "index.html";
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 올림픽: 50m 자유형 수영</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Jua', sans-serif; margin: 0; overflow: hidden; background-color: #0d47a1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
    
    .header-area { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; transition: opacity 0.3s; }
    h1 { margin: 0; font-size: 2.5em; color: #81d4fa; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    
    .top-home-btn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-size: 1.2em; z-index: 15; transition: opacity 0.3s, background 0.3s; }
    .top-home-btn:hover { background: rgba(255,255,255,0.4); }

    .canvas-container { position: relative; width: 100%; max-width: 1280px; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: cover; display: block; } 
    video { display: none; }
    
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,133,199,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    .overlay h2 { font-size: 3.5em; margin-bottom: 20px; text-align: center; line-height: 1.3; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    .overlay p { font-size: 1.8em; color: #ffeb3b; margin-bottom: 30px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); text-align: center; line-height: 1.5; }

    button { font-family: 'Jua', sans-serif; font-size: 1.8em; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #start-btn { background: #ffeb3b; color: #333; }
    button:hover { transform: scale(1.05); }
    
    #stop-btn { position: absolute; bottom: 20px; right: 20px; background: #DF0024; color: white; font-size: 1.2em; padding: 10px 20px; display: none; z-index: 10; border-radius: 50px;}
    
    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: white; color: #333; padding: 40px; border-radius: 30px; text-align: center; width: 80%; max-width: 500px; }
    .modal-content h2 { color: #0085C7; font-size: 3em; margin-top: 0; }
    .record-text { font-size: 2.5em; margin: 20px 0; color: #0085C7; }
    input[type="text"] { font-family: 'Jua', sans-serif; font-size: 1.5em; padding: 10px; width: 90%; text-align: center; border: 2px solid #ccc; border-radius: 15px; margin-bottom: 20px; }
    
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn-group button { font-size: 1.1em; padding: 12px; border-radius: 15px; }
    .save-vid { background: #009F3D; color: white; }
    .save-img { background: #0085C7; color: white; }
    
    .replay-btn { background: #ff9800; color: white; width: 100%; margin-bottom: 10px; }
    .exit-btn { background: #757575; color: white; width: 100%; font-size: 1.5em; text-decoration: none; display: block; padding: 15px 0; border-radius: 50px; }
  </style>
</head>
<body>

  <audio id="bgm" src="media/swim_bgm.mp3" loop></audio>
  <audio id="sfx-count" src="media/countdown.mp3"></audio>
  <audio id="sfx-start" src="media/start.mp3"></audio>
  <audio id="sfx-cheer" src="media/cheer.mp3"></audio>

  <div id="ui-header" class="header-area">
    <h1>🏊‍♂️ 스마트 올림픽: 50m 자유형 수영</h1>
  </div>
  <a id="ui-home" href="index.html" class="top-home-btn">🏠 메인으로</a>

  <div class="canvas-container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="overlay" class="overlay">
      <h2>양팔을 번갈아 가며<br>시원하게 수영하세요!</h2>
      <p>💡 왼팔 한 번, 오른팔 한 번 쓱쓱 저어주면 됩니다!<br>양팔 모두 저어 한 사이클 완성 시 +3m 보너스!</p>
      <button id="start-btn">도전 시작!</button>
    </div>
    
    <button id="stop-btn">중단하기</button>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>터치패드 완료! 🎉</h2>
        <div id="final-record" class="record-text">0.00초</div>
        <input type="text" id="player-name" placeholder="선수 이름을 적어주세요">
        <div class="btn-group">
          <button id="save-vid-btn" class="save-vid">🎥 영상 저장</button>
          <button id="save-img-btn" class="save-img">📸 사진 저장</button>
        </div>
        <button id="replay-btn" class="replay-btn">🔄 다시 도전하기</button>
        <a href="index.html" class="exit-btn">🏠 메인 화면으로</a>
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    canvasElement.width = 1280; canvasElement.height = 720;
    const canvasCtx = canvasElement.getContext('2d');
    
    const uiHeader = document.getElementById('ui-header');
    const uiHome = document.getElementById('ui-home');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const replayBtn = document.getElementById('replay-btn');
    const overlay = document.getElementById('overlay');
    const resultModal = document.getElementById('result-modal');

    const recordCanvas = document.createElement('canvas');
    recordCanvas.width = 1280; recordCanvas.height = 720;
    const recordCtx = recordCanvas.getContext('2d');

    const highlightCanvas = document.createElement('canvas');
    highlightCanvas.width = 1280; highlightCanvas.height = 720;
    const highlightCtx = highlightCanvas.getContext('2d');

    function playSound(id) { 
      const s = document.getElementById(id); 
      if(s){ s.currentTime = 0; s.play().catch(e => console.warn(e)); } 
    }

    const COUNTDOWN_SPEED = 500; 
    let gameState = 'waiting'; let distance = 0; let currentTimeStr = "0.00"; let startTime = 0;
    let countdownTick = 3; let countdownDisplay = ""; let countdownInterval = null;
    
    let leftArmState = 0; 
    let rightArmState = 0;
    
    let bonusEffects = []; 
    let lastStrokeTime = 0; 
    let lastArmStroked = ""; 
    let strokeCycleCount = 0;

    let mediaRecorder; let recordedChunks = [];
    let audioCtx; let audioDest; let globalMicStream = null;

    async function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        try {
          globalMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const micSource = audioCtx.createMediaStreamSource(globalMicStream);
          const micGain = audioCtx.createGain(); micGain.gain.value = 3.0; 
          micSource.connect(micGain); micGain.connect(audioDest);
        } catch (e) {}
        const gameGain = audioCtx.createGain(); gameGain.gain.value = 0.4; 
        gameGain.connect(audioDest); gameGain.connect(audioCtx.destination);
        document.querySelectorAll('audio').forEach(el => {
          if (!el.dataset.routed) {
            const source = audioCtx.createMediaElementSource(el);
            source.connect(gameGain); el.dataset.routed = "true";
          }
        });
      }
      await audioCtx.resume();
    }

    stopBtn.addEventListener('click', () => { location.reload(); });

    replayBtn.addEventListener('click', () => {
      resultModal.style.display = 'none';
      overlay.style.display = 'flex';
      startBtn.disabled = false;
      startBtn.innerText = "도전 시작!";
      gameState = 'waiting';
    });

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      await initAudio();
      startGameCycle();
    });

    function startGameCycle() {
      overlay.style.display = 'none'; 
      uiHeader.style.opacity = '0';
      uiHome.style.opacity = '0';
      stopBtn.style.display = 'block';

      distance = 0; currentTimeStr = "0.00"; bonusEffects = [];
      leftArmState = 0; rightArmState = 0;
      lastStrokeTime = 0; lastArmStroked = ""; 
      strokeCycleCount = 0; 
      
      gameState = 'countdown'; countdownTick = 3; countdownDisplay = "3";
      
      playSound('sfx-count'); 

      countdownInterval = setInterval(() => {
        countdownTick--;
        if (countdownTick > 0) {
          countdownDisplay = countdownTick.toString();
        } else if (countdownTick === 0) {
          countdownDisplay = "START!";
          playSound('sfx-start');
        } else {
          clearInterval(countdownInterval);
          gameState = 'playing';
          startTime = Date.now();
          
          const bgm = document.getElementById('bgm');
          if(bgm) { bgm.currentTime = 0; bgm.play(); }

          startRecording();
        }
      }, COUNTDOWN_SPEED);
    }

    function onResults(results) {
      if (!results.image) return;
      const cw = 1280; const ch = 720;
      
      canvasCtx.drawImage(results.image, 0, 0, cw, ch);
      recordCtx.drawImage(results.image, 0, 0, cw, ch);

      if (results.poseLandmarks) {
        canvasCtx.save();
        canvasCtx.globalAlpha = 0.4;
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 4});
        canvasCtx.globalAlpha = 0.6;
        drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#00BFFF', lineWidth: 2, radius: 4});
        canvasCtx.restore();

        if (gameState === 'playing') {
          const lm = results.poseLandmarks;
          
          const leftShoulder = lm[11]; const rightShoulder = lm[12];
          const leftWrist = lm[15]; const rightWrist = lm[16];
          const leftHip = lm[23]; const rightHip = lm[24];

          const torsoLength = Math.max(Math.abs(((leftHip.y + rightHip.y) / 2) - ((leftShoulder.y + rightShoulder.y) / 2)), 0.1);

          // 🌟 동작 인식 궤적 대폭 완화! (어깨 살짝 아래에서 시작해 명치까지만 내려도 OK)
          const highLineL = leftShoulder.y + (torsoLength * 0.1); 
          const lowLineL = leftShoulder.y + (torsoLength * 0.3); 
          const highLineR = rightShoulder.y + (torsoLength * 0.1);
          const lowLineR = rightShoulder.y + (torsoLength * 0.3);

          // 🌟 팔 뻗기(리치) 조건 대폭 완화! (살짝 굽히고 물 잡듯이 돌려도 OK)
          const leftArmDist = Math.hypot(leftWrist.x - leftShoulder.x, leftWrist.y - leftShoulder.y);
          const rightArmDist = Math.hypot(rightWrist.x - rightShoulder.x, rightWrist.y - rightShoulder.y);
          const isLeftExtended = leftArmDist > (torsoLength * 0.25);
          const isRightExtended = rightArmDist > (torsoLength * 0.25);

          // --- 왼쪽 팔 판정 ---
          if (isLeftExtended) {
            if (leftWrist.y < highLineL) {
              leftArmState = 1; 
            } else if (leftArmState === 1 && leftWrist.y > lowLineL) {
              let now = Date.now();
              // 🌟 쿨다운 0.3초로 단축하여 조금 빠른 템포도 인정
              if (now - lastStrokeTime > 300 && lastArmStroked !== 'L') {
                distance += 1; 
                strokeCycleCount++; 
                
                if (strokeCycleCount >= 2) {
                  distance += 3; 
                  bonusEffects.push({ x: leftWrist.x, y: leftWrist.y, time: now });
                  strokeCycleCount = 0; 
                }
                
                lastStrokeTime = now;
                lastArmStroked = 'L';
              }
              leftArmState = 0; 
            }
          } else {
            leftArmState = 0; 
          }

          // --- 오른쪽 팔 판정 ---
          if (isRightExtended) {
            if (rightWrist.y < highLineR) {
              rightArmState = 1; 
            } else if (rightArmState === 1 && rightWrist.y > lowLineR) {
              let now = Date.now();
              // 🌟 쿨다운 0.3초 단축
              if (now - lastStrokeTime > 300 && lastArmStroked !== 'R') {
                distance += 1; 
                strokeCycleCount++; 
                
                if (strokeCycleCount >= 2) {
                  distance += 3; 
                  bonusEffects.push({ x: rightWrist.x, y: rightWrist.y, time: now });
                  strokeCycleCount = 0; 
                }
                
                lastStrokeTime = now;
                lastArmStroked = 'R';
              }
              rightArmState = 0; 
            }
          } else {
            rightArmState = 0; 
          }

          // 보너스 이펙트 렌더링
          for (let i = bonusEffects.length - 1; i >= 0; i--) {
            let effect = bonusEffects[i];
            let age = Date.now() - effect.time;
            if (age > 1000) { 
              bonusEffects.splice(i, 1); 
            } else {
              let alpha = 1 - (age / 1000);
              let floatY = effect.y * ch - (age / 5); 
              const drawBonus = (ctx) => {
                ctx.fillStyle = `rgba(255, 235, 59, ${alpha})`;
                ctx.strokeStyle = `rgba(0, 0, 0, ${alpha})`;
                ctx.lineWidth = 4;
                ctx.font = "bold 60px 'Jua', sans-serif";
                ctx.textAlign = "center";
                ctx.strokeText("🌀퍼펙트! +3m", effect.x * cw, floatY);
                ctx.fillText("🌀퍼펙트! +3m", effect.x * cw, floatY);
              };
              drawBonus(canvasCtx); drawBonus(recordCtx);
            }
          }
        }
      }

      drawUI(canvasCtx, cw, ch);
      drawUI(recordCtx, cw, ch);

      if (gameState === 'playing') {
        currentTimeStr = ((Date.now() - startTime) / 1000).toFixed(2);
        
        if (distance >= 50) {
          distance = 50;
          highlightCtx.drawImage(recordCanvas, 0, 0, cw, ch);
          
          gameState = 'finished'; stopRecording();
          stopBtn.style.display = 'none';
          document.getElementById('bgm').pause();
          playSound('sfx-cheer');
          document.getElementById('final-record').innerText = `기록: ${currentTimeStr}초`;
          resultModal.style.display = 'flex';
          uiHeader.style.opacity = '1';
          uiHome.style.opacity = '1';
        }
      }
    }

    function drawUI(ctx, cw, ch) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";

      if (gameState === 'countdown') {
        ctx.font = "bold 120px 'Jua', sans-serif";
        ctx.fillStyle = "#ffeb3b";
        ctx.fillText(countdownDisplay, cw/2, ch/2);
      } else if (gameState === 'playing' || gameState === 'finished') {
        ctx.font = "bold 80px 'Jua', sans-serif";
        ctx.textAlign = "left"; ctx.fillStyle = "#81d4fa";
        ctx.fillText(`🏊 ${Math.floor(distance)}m / 50m`, 40, 60);
        ctx.textAlign = "right"; ctx.fillStyle = "#ffeb3b";
        ctx.fillText(`⏱️ ${currentTimeStr}초`, cw - 40, 60);
        
        if (gameState === 'playing') {
          ctx.fillStyle = "rgba(255,255,255,0.3)";
          ctx.fillRect(100, ch - 50, cw - 200, 20);
          ctx.fillStyle = "#00BFFF";
          ctx.fillRect(100, ch - 50, (cw - 200) * (distance / 50), 20);
        }
      }
    }

    function startRecording() {
      recordedChunks = [];
      const stream = new MediaStream([...recordCanvas.captureStream(30).getTracks(), ...audioDest.stream.getTracks()]);
      let options = { mimeType: 'video/webm' };
      if (MediaRecorder.isTypeSupported('video/mp4')) { options = { mimeType: 'video/mp4' }; }
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.start();
    }
    
    function stopRecording() { if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); }

    document.getElementById('save-vid-btn').onclick = () => {
      const actualMimeType = mediaRecorder.mimeType || 'video/webm'; const ext = actualMimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: actualMimeType });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `스마트올림픽_수영_${document.getElementById('player-name').value || '선수'}_${currentTimeStr}초.${ext}`; a.click();
    };

    document.getElementById('save-img-btn').onclick = () => {
      const name = document.getElementById('player-name').value || "선수"; const cw = 1280; const ch = 720;
      
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = cw; tempCanvas.height = ch;
      const tempCtx = tempCanvas.getContext('2d');
      
      tempCtx.drawImage(highlightCanvas, 0, 0, cw, ch);
      
      tempCtx.font = "80px 'Jua', sans-serif"; tempCtx.textAlign = "center"; 
      tempCtx.fillStyle = "white"; tempCtx.strokeStyle = "black"; tempCtx.lineWidth = 6;
      tempCtx.strokeText(`🏆 ${name}의 수영 기록: ${currentTimeStr}초`, cw / 2, ch - 50); 
      tempCtx.fillText(`🏆 ${name}의 수영 기록: ${currentTimeStr}초`, cw / 2, ch - 50);
      
      const a = document.createElement('a'); a.href = tempCanvas.toDataURL();
      a.download = `스마트올림픽_수영_${name}_기록증.png`; a.click();
    };

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ selfieMode: true, modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 }).start();
  </script>
</body>
</html>
