<!DOCTYPE html>
<html lang="ko">
<head>
  <script>
    // 강제 점검 모드: 모든 접속을 index.html로 돌려보냄
    window.location.href = "index.html";
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트 올림픽: 서핑 밸런스</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Jua', sans-serif; margin: 0; overflow: hidden; background-color: #E1F5FE; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; }
    .header-area { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; transition: opacity 0.3s; }
    h1 { margin: 0; font-size: 2.5em; color: #0288D1; text-shadow: 2px 2px 4px rgba(255,255,255,0.8); }
    .top-home-btn { position: absolute; top: 20px; left: 20px; background: rgba(2, 136, 209, 0.8); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-size: 1.2em; z-index: 15; transition: opacity 0.3s, background 0.3s; }
    .top-home-btn:hover { background: rgba(1, 87, 155, 1); }
    .canvas-container { position: relative; width: 100%; max-width: 1280px; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; border: 5px solid #0288D1; }
    canvas { width: 100%; height: 100%; object-fit: cover; display: block; } 
    video { display: none; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 136, 209, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
    .overlay h2 { font-size: 3.5em; margin-bottom: 30px; text-align: center; line-height: 1.3; color: white; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    button { font-family: 'Jua', sans-serif; font-size: 1.8em; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #start-btn { background: #ffeb3b; color: #333; }
    button:hover { transform: scale(1.05); }
    #stop-btn { position: absolute; bottom: 20px; right: 20px; background: #DF0024; color: white; font-size: 1.2em; padding: 10px 20px; display: none; z-index: 10; border-radius: 50px;}
    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
    .modal-content { background: white; color: #333; padding: 40px; border-radius: 30px; text-align: center; width: 80%; max-width: 500px; }
    .modal-content h2 { color: #d32f2f; font-size: 3em; margin-top: 0; }
    .record-text { font-size: 2.5em; margin: 20px 0; color: #ff9800; }
    input[type="text"] { font-family: 'Jua', sans-serif; font-size: 1.5em; padding: 10px; width: 90%; text-align: center; border: 2px solid #ccc; border-radius: 15px; margin-bottom: 20px; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn-group button { font-size: 1.1em; padding: 12px; border-radius: 15px; }
    .save-vid { background: #009F3D; color: white; }
    .save-img { background: #0288D1; color: white; }
    .replay-btn { background: #03A9F4; color: white; width: 100%; margin-bottom: 10px; }
    .exit-btn { background: #757575; color: white; width: 100%; font-size: 1.5em; text-decoration: none; display: block; padding: 15px 0; border-radius: 50px; }
  </style>
</head>
<body>

  <audio id="bgm" src="media/surfing_bgm.mp3" loop></audio>
  <audio id="sfx-count" src="media/countdown.mp3"></audio>
  <audio id="sfx-start" src="media/start.mp3"></audio>
  <audio id="sfx-coin" src="media/coin.mp3"></audio>
  <audio id="sfx-damage" src="media/damage.mp3"></audio>
  <audio id="sfx-gameover" src="media/gameover.mp3"></audio>

  <div id="ui-header" class="header-area">
    <h1>🏄‍♂️ 스마트 올림픽: 서핑 밸런스</h1>
  </div>
  <a id="ui-home" href="index.html" class="top-home-btn">🏠 메인으로</a>

  <div class="canvas-container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="overlay" class="overlay">
      <h2>몸을 좌우로 기울여<br>돌고래를 피하고 동전을 드세요!</h2>
      <button id="start-btn">도전 시작!</button>
    </div>
    
    <button id="stop-btn">중단하기</button>

    <div id="result-modal" class="modal">
      <div class="modal-content">
        <h2>게임 오버! 🌊</h2>
        <div id="final-record" class="record-text">최종 점수: 0점</div>
        <input type="text" id="player-name" placeholder="선수 이름을 적어주세요">
        <div class="btn-group">
          <button id="save-vid-btn" class="save-vid">🎥 영상 저장</button>
          <button id="save-img-btn" class="save-img">📸 사진 저장</button>
        </div>
        <button id="replay-btn" class="replay-btn">🔄 다시 도전하기</button>
        <a href="index.html" class="exit-btn">🏠 메인 화면으로</a>
      </div>
    </div>
  </div>

  <script>
    const customCoinImg = new Image(); customCoinImg.src = 'media/coin.png';
    const customSurferImg = new Image(); customSurferImg.src = 'media/surfer.png';
    const customDolphinImg = new Image(); customDolphinImg.src = 'media/dolphin.png';

    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    canvasElement.width = 1280; canvasElement.height = 720;
    const canvasCtx = canvasElement.getContext('2d');
    
    const uiHeader = document.getElementById('ui-header');
    const uiHome = document.getElementById('ui-home');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const replayBtn = document.getElementById('replay-btn');
    const overlay = document.getElementById('overlay');
    const resultModal = document.getElementById('result-modal');

    const recordCanvas = document.createElement('canvas');
    recordCanvas.width = 1280; recordCanvas.height = 720;
    const recordCtx = recordCanvas.getContext('2d');

    const highlightCanvas = document.createElement('canvas');
    highlightCanvas.width = 1280; highlightCanvas.height = 720;
    const highlightCtx = highlightCanvas.getContext('2d');

    function playSound(id) { 
      const s = document.getElementById(id); 
      if(s){ s.currentTime = 0; s.play().catch(e => console.warn(e)); } 
    }

    const COUNTDOWN_SPEED = 500; 
    let gameState = 'waiting'; let startTime = 0; 
    let countdownTick = 3; let countdownDisplay = ""; let countdownInterval = null;
    
    let score = 0; let lives = 3; let playerX = 0.5; 
    let obstacles = []; let coins = []; 
    let speedMultiplier = 1.0; let lastSpawnTime = 0;

    let mediaRecorder; let recordedChunks = [];
    let audioCtx; let audioDest; let globalMicStream = null;

    async function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
        try {
          globalMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const micSource = audioCtx.createMediaStreamSource(globalMicStream);
          const micGain = audioCtx.createGain(); micGain.gain.value = 3.0; 
          micSource.connect(micGain); micGain.connect(audioDest);
        } catch (e) {}
        const gameGain = audioCtx.createGain(); gameGain.gain.value = 0.4; 
        gameGain.connect(audioDest); gameGain.connect(audioCtx.destination);
        document.querySelectorAll('audio').forEach(el => {
          if (!el.dataset.routed) {
            const source = audioCtx.createMediaElementSource(el);
            source.connect(gameGain); el.dataset.routed = "true";
          }
        });
      }
      await audioCtx.resume();
    }

    stopBtn.addEventListener('click', () => { location.reload(); });

    replayBtn.addEventListener('click', () => {
      resultModal.style.display = 'none';
      overlay.style.display = 'flex';
      startBtn.disabled = false;
      startBtn.innerText = "도전 시작!";
      gameState = 'waiting';
    });

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      await initAudio();
      startGameCycle();
    });

    function startGameCycle() {
      overlay.style.display = 'none'; 
      uiHeader.style.opacity = '0';
      uiHome.style.opacity = '0';
      stopBtn.style.display = 'block';

      score = 0; lives = 3; playerX = 0.5; obstacles = []; coins = []; speedMultiplier = 1.0;
      gameState = 'countdown'; countdownTick = 3; countdownDisplay = "3";
      
      playSound('sfx-count'); 

      countdownInterval = setInterval(() => {
        countdownTick--;
        if (countdownTick > 0) {
          countdownDisplay = countdownTick.toString();
        } else if (countdownTick === 0) {
          countdownDisplay = "GO!";
          playSound('sfx-start');
        } else {
          clearInterval(countdownInterval);
          gameState = 'playing';
          startTime = Date.now();
          lastSpawnTime = Date.now(); 
          
          const bgm = document.getElementById('bgm');
          if(bgm) { bgm.currentTime = 0; bgm.play(); }

          startRecording();
        }
      }, COUNTDOWN_SPEED);
    }

    function onResults(results) {
      if (!results.image) return;
      const cw = 1280; const ch = 720;
      
      canvasCtx.drawImage(results.image, 0, 0, cw, ch);
      recordCtx.drawImage(results.image, 0, 0, cw, ch);

      canvasCtx.fillStyle = "rgba(129, 212, 250, 0.35)"; canvasCtx.fillRect(0, 0, cw, ch);
      recordCtx.fillStyle = "rgba(129, 212, 250, 0.35)"; recordCtx.fillRect(0, 0, cw, ch);

      let checkGameOver = false; 

      if (results.poseLandmarks && gameState === 'playing') {
        const lm = results.poseLandmarks;
        
        const shoulderMidX = (lm[11].x + lm[12].x) / 2;
        let targetX = (shoulderMidX - 0.5) * 1.5 + 0.5; 
        if (targetX < 0.1) targetX = 0.1; 
        if (targetX > 0.9) targetX = 0.9;
        playerX += (targetX - playerX) * 0.2; 

        const now = Date.now(); 
        const elapsedTime = (now - startTime) / 1000;
        
        score += 0.3; 
        
        // 🌟 난이도 대폭 상승 패치 (속도 2.5배 더 빠르게 가속)
        speedMultiplier = 1.0 + (elapsedTime / 12); 

        if (now - lastSpawnTime > 800 / speedMultiplier) {
            const isCoin = Math.random() > 0.6; 
            if(isCoin) { 
              coins.push({ x: Math.random() * 0.8 + 0.1, y: -0.1, radius: 0.05 }); 
            } else { 
              obstacles.push({ x: Math.random() * 0.8 + 0.1, y: -0.1, radius: 0.06 }); 
            }
            lastSpawnTime = now;
        }

        const playerY = 0.8; const hitBoxRadius = 0.08; 

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i]; 
            obs.y += 0.015 * speedMultiplier; 
            
            if (Math.hypot(playerX - obs.x, playerY - obs.y) < hitBoxRadius + obs.radius) {
                lives -= 1; 
                obstacles.splice(i, 1); 
                playSound('sfx-damage'); 
                
                canvasCtx.fillStyle = "rgba(255, 0, 0, 0.4)"; 
                canvasCtx.fillRect(0, 0, cw, ch);
                
                if(lives <= 0) {
                    checkGameOver = true; 
                }
                continue;
            }
            if (obs.y > 1.1) obstacles.splice(i, 1);
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            let coin = coins[i]; 
            coin.y += 0.015 * speedMultiplier;
            
            if (Math.hypot(playerX - coin.x, playerY - coin.y) < hitBoxRadius + coin.radius) {
                score += 100; 
                coins.splice(i, 1); 
                playSound('sfx-coin'); 
                continue;
            }
            if (coin.y > 1.1) coins.splice(i, 1);
        }

        canvasCtx.save();
        canvasCtx.globalAlpha = 0.5;
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: 'rgba(255,255,255,0.5)', lineWidth: 4});
        canvasCtx.restore();

        const drawGameObjects = (ctx) => {
          for (let obs of obstacles) { 
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; 
            ctx.beginPath(); ctx.arc(obs.x * cw, obs.y * ch, 40, 0, 2*Math.PI); ctx.fill();
            if (customDolphinImg.complete && customDolphinImg.naturalHeight !== 0) {
              ctx.drawImage(customDolphinImg, obs.x * cw - 50, obs.y * ch - 50, 100, 100);
            } else {
              ctx.font = "80px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
              ctx.fillText("🦈", obs.x * cw, obs.y * ch); 
            }
          }
          
          for (let coin of coins) { 
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.beginPath(); ctx.arc(coin.x * cw, coin.y * ch, 40, 0, 2*Math.PI); ctx.fill();
            if (customCoinImg.complete && customCoinImg.naturalHeight !== 0) {
              ctx.drawImage(customCoinImg, coin.x * cw - 40, coin.y * ch - 40, 80, 80);
            } else {
              ctx.font = "80px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
              ctx.fillText("🪙", coin.x * cw, coin.y * ch);
            }
          }
          
          ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
          ctx.beginPath(); ctx.arc(playerX * cw, playerY * ch, 90, 0, 2*Math.PI); ctx.fill();
          if (customSurferImg.complete && customSurferImg.naturalHeight !== 0) {
            ctx.drawImage(customSurferImg, playerX * cw - 100, playerY * ch - 100, 200, 200);
          } else {
            ctx.font = "180px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("🏄‍♂️", playerX * cw, playerY * ch);
          }
        };
        
        drawGameObjects(canvasCtx);
        drawGameObjects(recordCtx);
      }
      
      drawUI(canvasCtx, cw, ch);
      drawUI(recordCtx, cw, ch);

      if (gameState === 'playing' && checkGameOver) {
        highlightCtx.drawImage(recordCanvas, 0, 0, cw, ch); 
        
        gameState = 'finished'; stopRecording(); stopBtn.style.display = 'none';
        document.getElementById('bgm').pause(); playSound('sfx-gameover'); 
        document.getElementById('final-record').innerText = `최종 점수: ${Math.floor(score)}점`; 
        resultModal.style.display = 'flex';
        uiHeader.style.opacity = '1'; uiHome.style.opacity = '1';
      }
    }

    function drawUI(ctx, cw, ch) {
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.8)";

      if (gameState === 'countdown') {
        ctx.font = "bold 150px 'Jua', sans-serif";
        ctx.fillStyle = "#ffeb3b";
        ctx.fillText(countdownDisplay, cw/2, ch/2);
      } else if (gameState === 'playing' || gameState === 'finished') {
        ctx.font = "bold 60px 'Jua', sans-serif";
        ctx.textAlign = "left"; ctx.fillStyle = "#fff";
        ctx.fillText(`🏆 점수: ${Math.floor(score)}`, 40, 50);
        
        let hearts = "❤️".repeat(Math.max(0, lives)) + "🤍".repeat(Math.max(0, 3 - lives));
        ctx.textAlign = "right"; ctx.fillStyle = "#fff";
        ctx.fillText(hearts, cw - 40, 50);
      }
    }

    function startRecording() {
      recordedChunks = [];
      const stream = new MediaStream([...recordCanvas.captureStream(30).getTracks(), ...audioDest.stream.getTracks()]);
      let options = { mimeType: 'video/webm' };
      if (MediaRecorder.isTypeSupported('video/mp4')) { options = { mimeType: 'video/mp4' }; }
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.start();
    }
    
    function stopRecording() { if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); }

    document.getElementById('save-vid-btn').onclick = () => {
      const actualMimeType = mediaRecorder.mimeType || 'video/webm'; const ext = actualMimeType.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(recordedChunks, { type: actualMimeType });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `스마트올림픽_서핑_${document.getElementById('player-name').value || '선수'}_${Math.floor(score)}점.${ext}`; a.click();
    };

    document.getElementById('save-img-btn').onclick = () => {
      const name = document.getElementById('player-name').value || "선수"; const cw = 1280; const ch = 720;
      const tempCanvas = document.createElement('canvas'); tempCanvas.width = cw; tempCanvas.height = ch;
      const tempCtx = tempCanvas.getContext('2d');
      
      tempCtx.drawImage(highlightCanvas, 0, 0, cw, ch);
      
      tempCtx.font = "80px 'Jua', sans-serif"; tempCtx.textAlign = "center"; 
      tempCtx.fillStyle = "white"; tempCtx.strokeStyle = "black"; tempCtx.lineWidth = 6;
      tempCtx.strokeText(`🏆 ${name}의 서핑 점수: ${Math.floor(score)}점`, cw / 2, ch - 50); 
      tempCtx.fillText(`🏆 ${name}의 서핑 점수: ${Math.floor(score)}점`, cw / 2, ch - 50);
      
      const a = document.createElement('a'); a.href = tempCanvas.toDataURL();
      a.download = `스마트올림픽_서핑_${name}_기록증.png`; a.click();
    };

    const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
    pose.setOptions({ selfieMode: true, modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    pose.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => { await pose.send({image: videoElement}); }, width: 1280, height: 720 }).start();
  </script>
</body>
</html>
